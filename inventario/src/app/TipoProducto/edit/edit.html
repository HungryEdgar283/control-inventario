<div class="card mt-3">
    <div class="card-header bg-dark text-white">
        <h5 class="mb-0">Modificar Nombre del Tipo de Producto</h5>
    </div>

    <div class="card-body">
        <form (ngSubmit)="Actualizar()">

            <div class="mb-3">
                <label class="form-label fw-bold text-dark">Nombre del Tipo de Producto:</label>
                <input type="text" [(ngModel)]="tipoProducto.nombre" name="nombre" class="form-control" placeholder="Ej. Electrónica" required>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-warning btn-sm me-2">Actualizar Tipo</button>
            </div>

        </form>
    </div>
</div>
